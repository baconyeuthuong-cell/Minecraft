<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Pro: Day/Night & Layers</title>
    <style>
        * { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; outline: none; -webkit-tap-highlight-color: transparent; touch-action: none; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }
        #controls { position: absolute; bottom: 25px; left: 25px; display: grid; grid-template-columns: repeat(3, 55px); gap: 8px; }
        .btn { width: 55px; height: 55px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }
        #action-btns { position: absolute; bottom: 100px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #fff; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 6px; border-radius: 5px; border: 2px solid #444; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; margin: 0 4px; display: flex; align-items: center; justify-content: center; }
        .slot.active { border-color: #00ff00; background: rgba(255,255,255,0.1); }
        .item { width: 30px; height: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui">
        <div id="controls" class="interactive">
            <div></div><div class="btn" id="up">↑</div><div></div>
            <div class="btn" id="left">←</div><div class="btn" style="font-size:10px">MOVE</div><div class="btn" id="right">→</div>
            <div></div><div class="btn" id="down">↓</div><div></div>
        </div>
        <div id="action-btns" class="interactive">
            <div class="action-btn" id="build-btn" style="background: #1a73e8;">BUILD</div>
            <div class="action-btn" id="mine-btn" style="background: #d93025;">MINE</div>
            <div class="action-btn" id="jump-btn" style="background: rgba(255,255,255,0.3);">JUMP</div>
        </div>
        <div id="hotbar" class="interactive">
            <div class="slot active" data-type="grass"><div class="item" style="background:#2E7D32"></div></div>
            <div class="slot" data-type="dirt"><div class="item" style="background:#8B4513"></div></div>
            <div class="slot" data-type="stone"><div class="item" style="background:#808080"></div></div>
            <div class="slot" data-type="wood"><div class="item" style="background:#5D4037"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- NGÀY VÀ ĐÊM ---
        let time = 0;
        const sunLight = new THREE.DirectionalLight(0xffffff, 1);
        scene.add(sunLight);
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);

        const blocks = [];
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const mats = {
            grass: [new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x2E7D32}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513})],
            dirt: new THREE.MeshLambertMaterial({color: 0x8B4513}),
            stone: new THREE.MeshLambertMaterial({color: 0x777777}),
            wood: new THREE.MeshLambertMaterial({color: 0x5D4037}),
            leaf: new THREE.MeshLambertMaterial({color: 0x1B5E20})
        };

        // --- TẠO ĐỊA HÌNH NHIỀU LỚP ---
        function addBlock(x, y, z, type) {
            const b = new THREE.Mesh(geo, mats[type]);
            b.position.set(x, y, z);
            scene.add(b); blocks.push(b);
        }

        const CHUNK = 10;
        for(let x = -CHUNK; x < CHUNK; x++) {
            for(let z = -CHUNK; z < CHUNK; z++) {
                const h = Math.floor(Math.sin(x/4) * Math.cos(z/4) * 2);
                addBlock(x, h, z, 'grass');   // Lớp 1: Cỏ
                addBlock(x, h-1, z, 'dirt'); // Lớp 2: Đất
                addBlock(x, h-2, z, 'stone');// Lớp 3: Đá
            }
        }

        // --- VẬT LÝ & ĐIỀU KHIỂN ---
        let py = 5, vy = 0, yaw = 0, pitch = 0;
        let move = { fwd: false, bwd: false, lft: false, rgt: false };
        let selected = 'grass';

        // Xoay camera
        document.addEventListener('pointermove', e => {
            if (e.clientX > window.innerWidth / 2) {
                yaw -= e.movementX * 0.005;
                pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.005));
            }
        });

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = e => { e.preventDefault(); move[k] = true; };
            el.onpointerup = () => move[k] = false;
        };
        bind('up', 'fwd'); bind('down', 'bwd'); bind('left', 'lft'); bind('right', 'rgt');

        document.getElementById('jump-btn').onpointerdown = () => { if(vy === 0) vy = 0.15; };

        // Mine/Build
        const ray = new THREE.Raycaster();
        const getHit = () => {
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(blocks);
            return hits.length > 0 && hits[0].distance < 5 ? hits[0] : null;
        };
        document.getElementById('mine-btn').onclick = () => {
            const hit = getHit(); if(hit) { scene.remove(hit.object); blocks.splice(blocks.indexOf(hit.object), 1); }
        };
        document.getElementById('build-btn').onclick = () => {
            const hit = getHit(); if(hit) {
                const p = hit.object.position.clone().add(hit.face.normal);
                addBlock(p.x, p.y, p.z, selected);
            }
        };

        document.querySelectorAll('.slot').forEach(s => {
            s.onpointerdown = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active'); selected = s.dataset.type;
            };
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Xử lý Ngày/Đêm
            time += 0.001; 
            const sunY = Math.sin(time);
            sunLight.position.set(Math.cos(time) * 10, sunY * 10, 5);
            sunLight.intensity = Math.max(0, sunY);
            const skyCol = new THREE.Color().setHSL(0.6, 0.5, Math.max(0.1, sunY * 0.5 + 0.2));
            scene.background = skyCol;
            scene.fog.color = skyCol;

            // Di chuyển
            const s = 0.1, d = new THREE.Vector3();
            camera.getWorldDirection(d); d.y = 0; d.normalize();
            const r = new THREE.Vector3().crossVectors(camera.up, d).normalize();
            if (move.fwd) camera.position.addScaledVector(d, s);
            if (move.bwd) camera.position.addScaledVector(d, -s);
            if (move.lft) camera.position.addScaledVector(r, s);
            if (move.rgt) camera.position.addScaledVector(r, -s);

            // Trọng lực & Chết/Hồi sinh
            vy -= 0.008; py += vy;
            let ground = -10;
            for(let b of blocks) {
                if(Math.abs(b.position.x - camera.position.x) < 0.5 && Math.abs(b.position.z - camera.position.z) < 0.5) {
                    ground = Math.max(ground, b.position.y + 1);
                }
            }
            if(py < ground) { py = ground; vy = 0; }
            
            // Cơ chế rớt vực: Nếu rơi quá sâu, hồi sinh tại (0, 5, 0)
            if(py < -15) { py = 5; camera.position.set(0, py + 1.6, 0); vy = 0; }

            camera.position.y = py + 1.6; // Cao 2 block
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
