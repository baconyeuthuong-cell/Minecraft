<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Pro 2-Block Height</title>
    <style>
        /* Chống chọn văn bản và các hiệu ứng trình duyệt mặc định */
        * { 
            -webkit-touch-callout: none; 
            -webkit-user-select: none; 
            user-select: none; 
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        canvas { display: block; }
        
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .interactive { pointer-events: auto; }

        /* Controls */
        #controls { position: absolute; bottom: 25px; left: 25px; display: grid; grid-template-columns: repeat(3, 55px); gap: 8px; }
        .btn { width: 55px; height: 55px; background: rgba(0,0,0,0.5); border: 2px solid #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: white; font-size: 22px; }
        
        #action-btns { position: absolute; bottom: 100px; right: 25px; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { width: 75px; height: 75px; border-radius: 50%; border: 3px solid #fff; color: white; font-weight: bold; display: flex; align-items: center; justify-content: center; font-size: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        #hotbar { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.8); padding: 6px; border-radius: 5px; border: 2px solid #444; }
        .slot { width: 45px; height: 45px; border: 2px solid #777; margin: 0 4px; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .slot.active { border-color: #00ff00; background: rgba(255,255,255,0.1); transform: scale(1.1); }
        .item { width: 30px; height: 30px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui">
        <div id="controls" class="interactive">
            <div></div><div class="btn" id="up">↑</div><div></div>
            <div class="btn" id="left">←</div><div class="btn" style="font-size:10px">MOVE</div><div class="btn" id="right">→</div>
            <div></div><div class="btn" id="down">↓</div><div></div>
        </div>

        <div id="action-btns" class="interactive">
            <div class="action-btn" id="build-btn" style="background: #1a73e8;">BUILD</div>
            <div class="action-btn" id="mine-btn" style="background: #d93025;">MINE</div>
            <div class="action-btn" id="jump-btn" style="background: rgba(255,255,255,0.3);">JUMP</div>
        </div>

        <div id="hotbar" class="interactive">
            <div class="slot active" data-type="grass"><div class="item" style="background:#2E7D32"></div></div>
            <div class="slot" data-type="stone"><div class="item" style="background:#808080"></div></div>
            <div class="slot" data-type="sand"><div class="item" style="background:#EDC9AF"></div></div>
            <div class="slot" data-type="wood"><div class="item" style="background:#5D4037"></div></div>
            <div class="slot" data-type="leaf"><div class="item" style="background:#1B5E20"></div></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- KHỞI TẠO ENGINE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 15, 40);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const blocks = [];
        const CHUNK_SIZE = 8;
        const RENDER_DIST = 2;
        const loadedChunks = new Set();
        const geo = new THREE.BoxGeometry(1, 1, 1);
        
        const mats = {
            grass: [new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x2E7D32}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513}), new THREE.MeshLambertMaterial({color: 0x8B4513})],
            stone: new THREE.MeshLambertMaterial({color: 0x808080}),
            sand: new THREE.MeshLambertMaterial({color: 0xEDC9AF}),
            wood: new THREE.MeshLambertMaterial({color: 0x5D4037}),
            leaf: new THREE.MeshLambertMaterial({color: 0x1B5E20})
        };

        // --- HỆ THỐNG MAP VÔ TẬN ---
        function createChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (loadedChunks.has(key)) return;
            
            for(let x = 0; x < CHUNK_SIZE; x++) {
                for(let z = 0; z < CHUNK_SIZE; z++) {
                    const wx = cx * CHUNK_SIZE + x;
                    const wz = cz * CHUNK_SIZE + z;
                    const h = Math.floor(Math.sin(wx/5) * Math.cos(wz/5) * 2);
                    
                    addBlock(wx, h, wz, 'grass');
                    if(Math.random() > 0.985) spawnTree(wx, h + 1, wz);
                }
            }
            loadedChunks.add(key);
        }

        function addBlock(x, y, z, type) {
            const b = new THREE.Mesh(geo, mats[type]);
            b.position.set(x, y, z);
            scene.add(b); blocks.push(b);
            return b;
        }

        function spawnTree(x, y, z) {
            for(let i=0; i<4; i++) addBlock(x, y+i, z, 'wood'); // Thân cây cao hơn
            for(let ox=-1; ox<=1; ox++) {
                for(let oz=-1; oz<=1; oz++) {
                    for(let oy=3; oy<=4; oy++) {
                        if(Math.abs(ox)+Math.abs(oz) === 2 && oy === 4) continue;
                        addBlock(x+ox, y+oy, z+oz, 'leaf');
                    }
                }
            }
        }

        // --- VẬT LÝ & CHIỀU CAO NHÂN VẬT ---
        // Cao 2 block: Chân ở y, mắt ở y + 1.6
        let py = 2; // Vị trí chân khởi đầu
        camera.position.set(0, py + 1.6, 0); 
        
        let yaw = 0, pitch = 0, vy = 0;
        let move = { fwd: false, bwd: false, lft: false, rgt: false };
        let selectedType = 'grass';

        // Camera xoay
        document.addEventListener('pointermove', (e) => {
            if (e.clientX > window.innerWidth / 2) {
                yaw -= e.movementX * 0.005;
                pitch = Math.max(-1.5, Math.min(1.5, pitch - e.movementY * 0.005));
            }
        });

        // Điều khiển
        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.onpointerdown = (e) => { e.preventDefault(); move[k] = true; };
            el.onpointerup = () => move[k] = false;
        };
        bind('up', 'fwd'); bind('down', 'bwd'); bind('left', 'lft'); bind('right', 'rgt');

        // Hành động
        const ray = new THREE.Raycaster();
        const getHit = () => {
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(blocks);
            return hits.length > 0 && hits[0].distance < 5 ? hits[0] : null;
        };

        document.getElementById('mine-btn').onpointerdown = (e) => {
            e.preventDefault();
            const hit = getHit();
            if(hit) { scene.remove(hit.object); blocks.splice(blocks.indexOf(hit.object), 1); }
        };

        document.getElementById('build-btn').onpointerdown = (e) => {
            e.preventDefault();
            const hit = getHit();
            if(hit) {
                const pos = hit.object.position.clone().add(hit.face.normal);
                addBlock(pos.x, pos.y, pos.z, selectedType);
            }
        };

        document.getElementById('jump-btn').onpointerdown = (e) => {
            e.preventDefault();
            if(vy === 0) vy = 0.15; 
        };

        // Kho đồ
        document.querySelectorAll('.slot').forEach(s => {
            s.onpointerdown = () => {
                document.querySelectorAll('.slot').forEach(x => x.classList.remove('active'));
                s.classList.add('active');
                selectedType = s.dataset.type;
            };
        });

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));

        function animate() {
            requestAnimationFrame(animate);
            const s = 0.12, d = new THREE.Vector3();
            camera.getWorldDirection(d); d.y = 0; d.normalize();
            const r = new THREE.Vector3().crossVectors(camera.up, d).normalize();

            // Di chuyển mặt phẳng XZ
            if (move.fwd) camera.position.addScaledVector(d, s);
            if (move.bwd) camera.position.addScaledVector(d, -s);
            if (move.lft) camera.position.addScaledVector(r, s);
            if (move.rgt) camera.position.addScaledVector(r, -s);

            // Trọng lực & Nhảy
            vy -= 0.008;
            py += vy;

            // Tìm độ cao mặt đất tại vị trí hiện tại
            let groundY = -5;
            for(let b of blocks) {
                if(Math.abs(b.position.x - camera.position.x) < 0.5 && 
                   Math.abs(b.position.z - camera.position.z) < 0.5 &&
                   b.position.y < py + 0.5) {
                    groundY = Math.max(groundY, b.position.y + 1);
                }
            }

            if(py < groundY) {
                py = groundY;
                vy = 0;
            }

            // Cập nhật vị trí camera (Mắt ở py + 1.6)
            camera.position.y = py + 1.6;

            // Render Map Vô tận
            const pCX = Math.floor(camera.position.x / CHUNK_SIZE);
            const pCZ = Math.floor(camera.position.z / CHUNK_SIZE);
            for(let x = -RENDER_DIST; x <= RENDER_DIST; x++) {
                for(let z = -RENDER_DIST; z <= RENDER_DIST; z++) {
                    createChunk(pCX + x, pCZ + z);
                }
            }

            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
era);
        }
        update();
    </script>
</body>
</html>
