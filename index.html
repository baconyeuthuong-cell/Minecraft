<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Mobile - Build & Mine</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Điều khiển di chuyển */
        #controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; }
        .btn { width: 55px; height: 55px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; user-select: none; }
        
        /* Nút hành động */
        #action-btns { position: absolute; bottom: 80px; right: 25px; display: flex; flex-direction: column; gap: 12px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-weight: bold; font-size: 12px; color: white; border: 2px solid #fff; display: flex; align-items: center; justify-content: center; }
        #mine-btn { background: rgba(255, 0, 0, 0.5); }
        #build-btn { background: rgba(0, 120, 255, 0.5); }
        #jump-btn { background: rgba(255, 255, 255, 0.3); }

        /* Kho đồ */
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 4px; border: 2px solid #333; }
        .slot { width: 40px; height: 40px; border: 2px solid #fff; margin: 0 3px; background: #2E7D32; } /* Mặc định chọn cỏ */
    </style>
</head>
<body>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn" style="font-size:10px">WALK</div><div class="btn" id="right">→</div>
        <div></div><div class="btn" id="down">↓</div><div></div>
    </div>

    <div id="action-btns">
        <div class="action-btn" id="build-btn">BUILD</div>
        <div class="action-btn" id="mine-btn">MINE</div>
        <div class="action-btn" id="jump-btn">JUMP</div>
    </div>

    <div id="hotbar"><div class="slot"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const sun = new THREE.DirectionalLight(0xffffff, 0.5);
        sun.position.set(10, 20, 10);
        scene.add(sun);

        const blocks = [];
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const matGrass = [
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // cạnh
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x2E7D32}), // TOP XANH
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513})
        ];
        const matDirt = new THREE.MeshLambertMaterial({color: 0x8B4513}); // 6 mặt nâu

        // Tạo đất 3 lớp
        for(let x = -10; x < 10; x++) {
            for(let z = -10; z < 10; z++) {
                const b1 = new THREE.Mesh(geo, matGrass);
                b1.position.set(x, 0, z);
                scene.add(b1); blocks.push(b1);
                
                for(let y = -1; y >= -2; y--) {
                    const b2 = new THREE.Mesh(geo, matDirt);
                    b2.position.set(x, y, z);
                    scene.add(b2); blocks.push(b2);
                }
            }
        }

        // Thêm Cây
        function createTree(x, z) {
            const trunk = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x5D4037}));
            trunk.scale.set(0.5, 3, 0.5); trunk.position.set(x, 2, z);
            scene.add(trunk); blocks.push(trunk);
            const leaf = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x1B5E20}));
            leaf.scale.set(2, 2, 2); leaf.position.set(x, 4, z);
            scene.add(leaf); blocks.push(leaf);
        }
        for(let i=0; i<8; i++) createTree(Math.random()*16-8, Math.random()*16-8);

        // Camera & Điều khiển
        camera.position.set(0, 2, 8);
        let yaw = 0, pitch = 0, vy = 0;
        let move = { fwd: false, bwd: false, lft: false, rgt: false };

        document.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch' && e.clientX > window.innerWidth / 2) {
                yaw -= e.movementX * 0.006;
                pitch = Math.max(-1.4, Math.min(1.4, pitch - e.movementY * 0.006));
            }
        });

        const bind = (id, k) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); move[k] = true; });
            el.addEventListener('pointerup', () => move[k] = false);
        };
        bind('up', 'fwd'); bind('down', 'bwd'); bind('left', 'lft'); bind('right', 'rgt');

        // LOGIC PHÁ & ĐẶT BLOCK
        const ray = new THREE.Raycaster();
        const getHit = () => {
            ray.setFromCamera(new THREE.Vector2(0, 0), camera);
            const hits = ray.intersectObjects(blocks);
            return hits.length > 0 && hits[0].distance < 5 ? hits[0] : null;
        };

        document.getElementById('mine-btn').onclick = () => {
            const hit = getHit();
            if(hit) { scene.remove(hit.object); blocks.splice(blocks.indexOf(hit.object), 1); }
        };

        document.getElementById('build-btn').onclick = () => {
            const hit = getHit();
            if(hit) {
                const b = new THREE.Mesh(geo, matGrass);
                // Đặt khối mới dựa trên mặt của khối bị chạm (hit.face.normal)
                b.position.copy(hit.object.position).add(hit.face.normal);
                scene.add(b); blocks.push(b);
            }
        };

        document.getElementById('jump-btn').onclick = () => { if(camera.position.y <= 2.1) vy = 0.15; };

        function animate() {
            requestAnimationFrame(animate);
            const s = 0.12, d = new THREE.Vector3();
            camera.getWorldDirection(d); d.y = 0; d.normalize();
            const r = new THREE.Vector3().crossVectors(camera.up, d).normalize();

            if (move.fwd) camera.position.addScaledVector(d, s);
            if (move.bwd) camera.position.addScaledVector(d, -s);
            if (move.lft) camera.position.addScaledVector(r, s);
            if (move.rgt) camera.position.addScaledVector(r, -s);

            camera.position.y += vy;
            if(camera.position.y > 2) vy -= 0.01; else { camera.position.y = 2; vy = 0; }
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
