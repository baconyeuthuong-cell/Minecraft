<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Simple Minecraft</title>
    <style>
        body { margin: 0; background: #87CEEB; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. THIẾT LẬP CƠ BẢN
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer();
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ánh sáng đơn giản để nhìn rõ màu
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        // 2. TẠO KHỐI ĐẤT CỎ (Dễ hiểu hơn)
        const geometry = new THREE.BoxGeometry(1, 1, 1);
        
        // Định nghĩa màu: 0 là mặt bên, 2 là mặt trên (Xanh), 3 là mặt dưới
        const materialCỏ = [
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // bên
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // bên
            new THREE.MeshLambertMaterial({color: 0x228B22}), // TRÊN (XANH)
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // dưới
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // bên
            new THREE.MeshLambertMaterial({color: 0x8B4513})  // bên
        ];

        // Lát nền đất 10x10
        for(let x = -5; x < 5; x++) {
            for(let z = -5; z < 5; z++) {
                const ground = new THREE.Mesh(geometry, materialCỏ);
                ground.position.set(x, 0, z);
                scene.add(ground);
            }
        }

        // 3. TẠO CÂY (Thủ công cho dễ sửa)
        function taoCay(x, z) {
            // Thân cây
            const go = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({color: 0x5D4037}));
            go.scale.set(0.4, 2, 0.4);
            go.position.set(x, 1.5, z);
            scene.add(go);

            // Lá cây
            const la = new THREE.Mesh(geometry, new THREE.MeshLambertMaterial({color: 0x006400}));
            la.scale.set(1.5, 1.5, 1.5);
            la.position.set(x, 3, z);
            scene.add(la);
        }

        taoCay(2, 2);   // Cây 1
        taoCay(-3, -2); // Cây 2

        camera.position.set(0, 5, 8);
        camera.lookAt(0, 0, 0);

        // 4. ĐIỀU KHIỂN CAMERA (Vuốt đơn giản)
        let isDragging = false;
        let previousMouseX = 0;
        let previousMouseY = 0;

        document.addEventListener('pointerdown', (e) => {
            isDragging = true;
            previousMouseX = e.clientX;
            previousMouseY = e.clientY;
        });

        document.addEventListener('pointermove', (e) => {
            if (isDragging) {
                let deltaX = e.clientX - previousMouseX;
                let deltaY = e.clientY - previousMouseY;

                // Xoay quanh trục Y (trái phải)
                camera.rotation.y -= deltaX * 0.01;
                
                // Ngước lên xuống (trục X) - Giới hạn để không bị lật
                let nextRotationX = camera.rotation.x - deltaY * 0.01;
                if (nextRotationX > -1.2 && nextRotationX < 0.5) {
                    camera.rotation.x = nextRotationX;
                }

                previousMouseX = e.clientX;
                previousMouseY = e.clientY;
            }
        });

        document.addEventListener('pointerup', () => isDragging = false);

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
