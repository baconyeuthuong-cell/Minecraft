    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // --- 1. KHỞI TẠO THẾ GIỚI ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 10, 50); // Thêm sương mù cho đẹp

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Ánh sáng mặt trời
        const light = new THREE.DirectionalLight(0xffffff, 1.2);
        light.position.set(10, 20, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));

        // --- 2. TẠO MẶT ĐẤT RỘNG LỚN ---
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const matCo = [
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // Cạnh nâu
            new THREE.MeshLambertMaterial({color: 0x8B4513}), 
            new THREE.MeshLambertMaterial({color: 0x2E7D32}), // TRÊN XANH ĐẬM
            new THREE.MeshLambertMaterial({color: 0x8B4513}), // Dưới
            new THREE.MeshLambertMaterial({color: 0x8B4513}), 
            new THREE.MeshLambertMaterial({color: 0x8B4513})
        ];

        // Tạo nền đất 20x20 khối cho rộng
        for(let x = -10; x < 10; x++) {
            for(let z = -10; z < 10; z++) {
                const block = new THREE.Mesh(geo, matCo);
                block.position.set(x, 0, z);
                scene.add(block);
            }
        }

        // --- 3. HÀM TẠO CÂY NGẪU NHIÊN ---
        function taoCay(x, z) {
            // Thân cây cao thấp khác nhau tí cho tự nhiên
            const chieuCao = 2 + Math.random();
            const trunk = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x5D4037}));
            trunk.scale.set(0.4, chieuCao, 0.4);
            trunk.position.set(x, chieuCao/2 + 0.5, z);
            scene.add(trunk);

            // Lá cây tròn/vuông
            const leaves = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x1B5E20}));
            leaves.scale.set(1.8, 1.8, 1.8);
            leaves.position.set(x, chieuCao + 1, z);
            scene.add(leaves);
        }

        // Rải 15 cái cây ngẫu nhiên
        for(let i = 0; i < 15; i++) {
            let rx = Math.floor(Math.random() * 16) - 8;
            let rz = Math.floor(Math.random() * 16) - 8;
            if(rx !== 0 || rz !== 0) taoCay(rx, rz);
        }

        // --- 4. HỆ THỐNG CAMERA VUỐT SIÊU MƯỢT ---
        camera.position.set(0, 4, 12);
        let lon = 0, lat = -20; 
        let isUserInteracting = false;
        let onPointerDownPointerX = 0, onPointerDownPointerY = 0;
        let onPointerDownLon = 0, onPointerDownLat = 0;

        document.addEventListener('pointerdown', (e) => {
            isUserInteracting = true;
            onPointerDownPointerX = e.clientX;
            onPointerDownPointerY = e.clientY;
            onPointerDownLon = lon;
            onPointerDownLat = lat;
        });

        document.addEventListener('pointermove', (e) => {
            if (isUserInteracting) {
                // Tốc độ xoay (0.2) bạn có thể chỉnh to hơn để xoay nhanh hơn
                lon = (onPointerDownPointerX - e.clientX) * 0.2 + onPointerDownLon;
                lat = (e.clientY - onPointerDownPointerY) * 0.2 + onPointerDownLat;
                
                // Giới hạn để không nhìn xuyên xuống dưới chân hoặc lộn ngược
                lat = Math.max(-60, Math.min(20, lat));
            }
        });

        document.addEventListener('pointerup', () => isUserInteracting = false);

        function animate() {
            requestAnimationFrame(animate);

            // Tính toán hướng nhìn của camera
            const phi = THREE.MathUtils.degToRad(90 - lat);
            const theta = THREE.MathUtils.degToRad(lon);

            const target = new THREE.Vector3();
            target.setFromSphericalCoords(10, phi, theta);
            camera.lookAt(target);

            renderer.render(scene, camera);
        }
        animate();

        // Tự động chỉnh khi xoay điện thoại
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

<html>

        .slot.active { border-color: #fff; background-color: #777; }
    </style>

<body>

    <div id="dpad">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn">●</div><div class="btn" id="right">→</div>
        <div></div><div class="btn" id="down">↓</div><div></div>
    </div>
    <div class="btn" id="jump-btn">JUMP</div>

    <div id="hotbar">
        <div class="slot active"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
        <div class="slot"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x87CEEB, 5, 30);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.HemisphereLight(0xffffff, 0x444444, 1.2);
        scene.add(light);

        // Tạo mặt đất
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const matCo = [
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x2E7D32}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513})
        ];

        for(let x = -15; x < 15; x++) {
            for(let z = -15; z < 15; z++) {
                const b = new THREE.Mesh(geo, matCo);
                b.position.set(x, 0, z);
                scene.add(b);
            }
        }

        // Tạo cây
        function addTree(x, z) {
            const trunk = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x5D4037}));
            trunk.scale.set(0.4, 2, 0.4); trunk.position.set(x, 1.5, z);
            scene.add(trunk);
            const leaves = new THREE.Mesh(geo, new THREE.MeshLambertMaterial({color: 0x1B5E20}));
            leaves.scale.set(1.5, 1.5, 1.5); leaves.position.set(x, 3, z);
            scene.add(leaves);
        }
        for(let i=0; i<10; i++) addTree(Math.random()*20-10, Math.random()*20-10);

        // LOGIC DI CHUYỂN
        camera.position.set(0, 2, 5);
        let move = { fwd: false, bwd: false, lft: false, rgt: false };
        let speed = 0.1;

        // Bắt sự kiện nút bấm
        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', () => move[key] = true);
            el.addEventListener('pointerup', () => move[key] = false);
            el.addEventListener('pointerleave', () => move[key] = false);
        };
        setupBtn('up', 'fwd'); setupBtn('down', 'bwd');
        setupBtn('left', 'lft'); setupBtn('right', 'rgt');

        // Xoay Camera bằng vuốt (Vùng trống)
        let yaw = 0, pitch = 0;
        document.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch' && e.clientX > window.innerWidth / 2) {
                yaw -= e.movementX * 0.005;
                pitch = Math.max(-1, Math.min(1, pitch - e.movementY * 0.005));
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            
            // Xử lý di chuyển theo hướng camera nhìn
            if (move.fwd) camera.translateZ(-speed);
            if (move.bwd) camera.translateZ(speed);
            if (move.lft) camera.translateX(-speed);
            if (move.rgt) camera.translateX(speed);
            
            camera.position.y = 2; // Giữ độ cao nhân vật
            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
