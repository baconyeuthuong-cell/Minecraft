<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Mobile - Mining Update</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        canvas { display: block; }
        
        /* Cụm nút điều khiển */
        #controls { position: absolute; bottom: 20px; left: 20px; display: grid; grid-template-columns: repeat(3, 50px); gap: 5px; }
        .btn { width: 50px; height: 50px; background: rgba(255,255,255,0.2); border: 2px solid #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; color: white; font-size: 20px; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn:active { background: rgba(255,255,255,0.5); }
        
        /* Nút Nhảy và Đập Phá */
        #action-btns { position: absolute; bottom: 80px; right: 30px; display: flex; flex-direction: column; gap: 15px; }
        .action-btn { width: 65px; height: 65px; border-radius: 50%; font-size: 14px; }
        #mine-btn { background: rgba(255, 0, 0, 0.3); }

        /* Kho đồ */
        #hotbar { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); display: flex; background: rgba(0,0,0,0.6); padding: 4px; border: 2px solid #333; }
        .slot { width: 45px; height: 45px; border: 2px solid #888; margin: 0 3px; display: flex; align-items: center; justify-content: center; }
        .item-preview { width: 30px; height: 30px; border-radius: 2px; }
        .grass { background: #2E7D32; } .dirt { background: #8B4513; } .wood { background: #5D4037; }
    </style>
</head>
<body>

    <div id="controls">
        <div></div><div class="btn" id="up">↑</div><div></div>
        <div class="btn" id="left">←</div><div class="btn">●</div><div class="btn" id="right">→</div>
        <div></div><div class="btn" id="down">↓</div><div></div>
    </div>

    <div id="action-btns">
        <div class="btn action-btn" id="mine-btn">MINE</div>
        <div class="btn action-btn" id="jump-btn">JUMP</div>
    </div>

    <div id="hotbar">
        <div class="slot"><div class="item-preview grass"></div></div>
        <div class="slot"><div class="item-preview dirt"></div></div>
        <div class="slot"><div class="item-preview wood"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 1. KHỞI TẠO
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const sun = new THREE.DirectionalLight(0xffffff, 0.6);
        sun.position.set(5, 10, 5);
        scene.add(sun);

        // 2. TẠO THẾ GIỚI & DANH SÁCH KHỐI CÓ THỂ PHÁ
        const blocks = []; // Chứa các khối đất để có thể xóa
        const geo = new THREE.BoxGeometry(1, 1, 1);
        const matCo = [
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x2E7D32}), // Top
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513}),
            new THREE.MeshLambertMaterial({color: 0x8B4513})
        ];

        for(let x = -10; x < 10; x++) {
            for(let z = -10; z < 10; z++) {
                const b = new THREE.Mesh(geo, matCo);
                b.position.set(x, 0, z);
                scene.add(b);
                blocks.push(b);
            }
        }

        // 3. DI CHUYỂN & CAMERA (SỬA LỖI NGƯỢC)
        camera.position.set(0, 2, 5);
        let yaw = 0, pitch = 0;
        let move = { fwd: false, bwd: false, lft: false, rgt: false };

        document.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch' && e.clientX > window.innerWidth / 2) {
                yaw -= e.movementX * 0.005;
                pitch -= e.movementY * 0.005; 
                pitch = Math.max(-1.2, Math.min(1.2, pitch));
            }
        });

        const setupBtn = (id, key) => {
            const el = document.getElementById(id);
            el.addEventListener('pointerdown', (e) => { e.preventDefault(); move[key] = true; });
            el.addEventListener('pointerup', () => move[key] = false);
        };
        setupBtn('up', 'fwd'); setupBtn('down', 'bwd');
        setupBtn('left', 'lft'); setupBtn('right', 'rgt');

        // 4. LOGIC ĐẬP PHÁ KHỐI (MINE)
        const raycaster = new THREE.Raycaster();
        document.getElementById('mine-btn').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            // Bắn một tia từ giữa camera ra phía trước
            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
            const intersects = raycaster.intersectObjects(blocks);
            
            if (intersects.length > 0) {
                const target = intersects[0].object;
                // Chỉ cho phá những khối ở gần (khoảng cách < 4)
                if (intersects[0].distance < 4) {
                    scene.remove(target);
                    // Xóa khỏi danh sách blocks để không bắn trúng nữa
                    const index = blocks.indexOf(target);
                    if (index > -1) blocks.splice(index, 1);
                }
            }
        });

        // Nhảy
        let velocityY = 0;
        document.getElementById('jump-btn').addEventListener('pointerdown', () => {
            if(camera.position.y <= 2.1) velocityY = 0.15;
        });

        function animate() {
            requestAnimationFrame(animate);
            const speed = 0.1;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if (move.fwd) camera.position.addScaledVector(dir, speed);
            if (move.bwd) camera.position.addScaledVector(dir, -speed);
            if (move.lft) camera.position.addScaledVector(side, speed);
            if (move.rgt) camera.position.addScaledVector(side, -speed);

            camera.position.y += velocityY;
            if(camera.position.y > 2) velocityY -= 0.01;
            else { camera.position.y = 2; velocityY = 0; }

            camera.rotation.set(pitch, yaw, 0, 'YXZ');
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
